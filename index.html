<!doctype html><html lang="en"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>OBOK FOODS</title><style>body{margin:0;background:#1a1311;color:#fff;font-family:Arial,sans-serif;min-height:100vh;display:grid;place-items:center}.box{text-align:center}.logo{font-size:42px;font-weight:800;letter-spacing:.09em}.sub{color:#c7a568;letter-spacing:.2em;font-size:12px;margin:8px 0 30px}.links{display:flex;gap:10px;justify-content:center;flex-wrap:wrap}.links a{color:#fff;border:1px solid #6f625d;padding:11px 18px;text-decoration:none}</style></head><body><div class="box"><div class="logo">OBOK FOODS</div><div class="sub">SINCE 1952</div><div class="links"><a href="en/" data-language="en">English</a><a href="cn/" data-language="cn">简体中文</a><a href="ru/" data-language="ru">Русский</a></div></div><script>document.querySelectorAll('[data-language]').forEach(a=>a.onclick=()=>localStorage.setItem('obokLanguage',a.dataset.language));const saved=localStorage.getItem('obokLanguage');if(saved&&['en','cn','ru'].includes(saved)){location.replace(saved+'/')}else{const l=(navigator.language||'en').toLowerCase();location.replace(l.startsWith('zh')?'cn/':l.startsWith('ru')?'ru/':'en/')}</script></body></html>
